name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @dispatch/shared build

      - name: Generate Prisma client
        run: cd packages/backend && npx prisma generate

      - name: Run unit tests
        run: cd packages/backend && npx vitest run tests/allowlist.test.ts tests/config-dir.test.ts

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @dispatch/shared build

      - name: Generate Prisma client
        run: cd packages/backend && npx prisma generate

      - name: Run integration tests (Testcontainers + Postgres)
        run: cd packages/backend && npx vitest run tests/trpc.test.ts tests/conversations.test.ts
